# rsyslog configuration for dev stack log collector
# Receives logs from freeradius and vpn_pooler services via UDP/TCP

global(workDirectory="/var/lib/rsyslog")

# Load modules
module(load="imudp")
module(load="imtcp")
module(load="builtin:omfile")

# Listen on UDP and TCP port 514
input(type="imudp" port="514")
input(type="imtcp" port="514")

# Template: one log file per program name (syslog tag)
template(name="PerProgram" type="string"
    string="/var/log/remote/%programname%.log")

# Template: log line format
template(name="LogFormat" type="string"
    string="%timegenerated% %syslogtag%%msg%\n")

# Write all remote logs to per-program files
if $fromhost-ip != "127.0.0.1" then {
    action(type="omfile" dynaFile="PerProgram" template="LogFormat"
           dirCreateMode="0755" fileCreateMode="0644")
}

# Also write everything to a combined log
if $fromhost-ip != "127.0.0.1" then {
    action(type="omfile" file="/var/log/remote/all.log" template="LogFormat"
           dirCreateMode="0755" fileCreateMode="0644")
}
