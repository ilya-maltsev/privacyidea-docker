# Dev overrides — use Docker named volumes instead of host directories,
# bind-mount subproject source code, and enable auto-reload.
#
# Usage:
#   docker compose --env-file environment/application-dev.env \
#     -f docker-compose.yaml -f docker-compose.dev.yaml \
#     --profile fullstack up --build
#
# Or via Makefile:
#   make fullstack
#
volumes:
  pgdata: {}
  pidata: {}
  vpn_pooler_static: {}
  vpn_pooler_data: {}
  captive_static: {}
  rsyslog_logs: {}

services:
  db:
    volumes:
      - pgdata:/var/lib/postgresql/data:rw,Z

  privacyidea:
    volumes:
      - pidata:/privacyidea/etc/persistent:rw,Z

  freeradius:
    volumes:
      - type: bind
        source: ./rlm_python3/privacyidea_radius.py
        target: /usr/share/privacyidea/freeradius/privacyidea_radius.py
        read_only: true

  vpn_pooler:
    volumes:
      - type: bind
        source: ./pi-vpn-pooler
        target: /app
      - type: bind
        source: ./pi-vpn-pooler/data
        target: /app/data
    command:
      - sh
      - -c
      - >-
        python manage.py collectstatic --noinput 2>/dev/null;
        gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers 1
        --reload
        --timeout 120

  captive:
    volumes:
      - type: bind
        source: ./pi-custom-captive
        target: /app
    command:
      - sh
      - -c
      - >-
        python manage.py collectstatic --noinput 2>/dev/null;
        gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers 1
        --reload
        --timeout 120

  rsyslog:
    volumes:
      - rsyslog_logs:/var/log/remote
