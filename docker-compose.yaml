services:
  db:
    image: postgres:16-alpine
    env_file:
      - environment/${TAG:-prod}/db.env
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data:rw,Z
      - /etc/hosts:/etc/hosts:ro
    networks:
      - privacyidea
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-pi}"]
      interval: 5s
      retries: 5
      start_period: 30s
    profiles:
      - fullstack
      - stack

  privacyidea:
    build:
      context: .
      args:
        PI_VERSION: "3.13"
        PI_VERSION_BUILD: "3.13"
    image: privacyidea-docker:3.13
    depends_on:
      db:
        condition: service_healthy
    deploy:
      restart_policy:
        condition:  unless-stopped
        delay: 3s
        window: 60s
    env_file:
      - environment/${TAG:-prod}/privacyidea.env
    ports:
      - "${PI_PORT:-8080}:${PI_PORT:-8080}"
    volumes:
      - ./data/pidata:/privacyidea/etc/persistent:rw,Z
      - /etc/hosts:/etc/hosts:ro
      - type: bind
        source: scripts/
        target: /privacyidea/scripts/
        read_only: true
      - type: bind
        source: templates/resolver.json
        target: /privacyidea/etc/persistent/resolver.json
        read_only: true
    networks:
      - privacyidea
    healthcheck:
        test: [ "CMD", "/privacyidea/healthcheck.py" ]
        start_period: 10s
        start_interval: 10s
        interval: 12s
        timeout: 10s
        retries: 6
    restart: always
    profiles:
      - fullstack
      - stack

  reverse_proxy:
    image: nginx:stable-alpine
    environment:
      APP_PORT: ${PI_PORT:-8080}
      SERVERNAME: ${PROXY_SERVERNAME:-localhost}
      SSL_CERT: /etc/nginx/ssl/pi.pem
      SSL_KEY: /etc/nginx/ssl/pi.key
    ports:
      - "${PROXY_PORT}:443"
      - "${VPN_POOLER_PORT:-5443}:444"
      - "${CAPTIVE_PORT:-6443}:445"
    volumes:
      - type: bind
        source: ./templates/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
      - type: bind
        source: ${NGINX_TLS_KEY_PATH:-./templates/pi.key}
        target: /etc/nginx/ssl/pi.key
        read_only: true
      - type: bind
        source: ${NGINX_TLS_CERT_PATH:-./templates/pi.pem}
        target: /etc/nginx/ssl/pi.pem
        read_only: true
      - type: bind
        source: ./templates/nginx_default.conf.template
        target: /etc/nginx/templates/default.conf.template
        read_only: true
      - type: bind
        source: ./templates/502.html
        target: /etc/privacyidea/customization/502.html
        read_only: true
      - /etc/hosts:/etc/hosts:ro
    networks:
      - privacyidea
    restart: always
    profiles:
      - fullstack
      - stack

  freeradius:
    build:
      context: ./rlm_python3
    image: privacyidea-freeradius:latest
    env_file:
      - environment/${TAG:-prod}/freeradius.env
    ports:
      - "${RADIUS_PORT:-1812}:1812/tcp"
      - "${RADIUS_PORT:-1812}:1812/udp"
      - "${RADIUS_PORT_INC:-1813}:1813/udp"
    command:
      # uncomment the two lines below to debug radius
      #- freeradius
      #- -X
    volumes:
      - type: bind
        source: ./templates/clients.conf
        target: /etc/raddb/clients.conf
        read_only: true
      - /etc/hosts:/etc/hosts:ro
    networks:
      - privacyidea
    restart: always
    profiles:
      - fullstack
      - stack

  vpn_pooler:
    build:
      context: ./pi-vpn-pooler
    image: pi-vpn-pooler:latest
    env_file:
      - environment/${TAG:-prod}/vpn_pooler.env
    environment:
      POOLS_FILE: /app/data/pools.yaml
    volumes:
      - ./data/vpn_pooler_static:/app/staticfiles
      - ./data/vpn_pooler_data:/app/data
      - /etc/hosts:/etc/hosts:ro
    expose:
      - "8000"
    networks:
      - privacyidea
    restart: always
    profiles:
      - fullstack
      - stack

  captive:
    build:
      context: ./pi-custom-captive
    image: pi-custom-captive:latest
    env_file:
      - environment/${TAG:-prod}/captive.env
    volumes:
      - ./data/captive_static:/app/staticfiles
      - /etc/hosts:/etc/hosts:ro
    expose:
      - "8000"
    networks:
      - privacyidea
    restart: always
    profiles:
      - fullstack
      - stack

  rsyslog:
    build:
      context: ./templates/rsyslog
    image: privacyidea-rsyslog:latest
    volumes:
      - ./data/rsyslog_logs:/var/log/remote
    networks:
      - privacyidea
    restart: always
    profiles:
      - fullstack

  openldap:
    image: osixia/openldap:latest
    environment:
      KEEP_EXISTING_CONFIG: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
      LDAP_SSL_HELPER_PREFIX: "ldap"
      LDAP_LOG_LEVEL: "0"
      LDAP_ORGANISATION: "Example Inc."
      LDAP_DOMAIN: "example.org"
      LDAP_BASE_DN: "dc=example,dc=org"
      LDAP_ADMIN_PASSWORD: "openldap"
      LDAP_CONFIG_PASSWORD: "config"
      LDAP_READONLY_USER: "false"
      LDAP_SEED_INTERNAL_LDIF_PATH: /ldif
      LDAP_RFC2307BIS_SCHEMA: "true"
    tty: true
    stdin_open: true
    ports:
      - "${LDAP_PORT}:389"
    networks:
      - privacyidea
    volumes:
      - type: bind
        source: ./templates/sample.ldif
        target: /ldif/sample.ldif
        read_only: true
    restart: always
    profiles:
      - fullstack
      - ldap
    
networks:
  privacyidea: {}
