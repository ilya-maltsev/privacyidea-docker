services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-pi}
      POSTGRES_USER: ${DB_USER:-pi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-superSecret}
      VPN_POOLER_DB_NAME: ${VPN_POOLER_DB_NAME:-vpn_pooler}
      VPN_POOLER_DB_USER: ${VPN_POOLER_DB_USER:-vpn_pooler}
      VPN_POOLER_DB_PASSWORD: ${VPN_POOLER_DB_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data:rw,Z
      - type: bind
        source: ./templates/init-vpn-pooler-db.sh
        target: /docker-entrypoint-initdb.d/init-vpn-pooler-db.sh
        read_only: true
    networks:
      - privacyidea
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pi}"]
      interval: 5s
      retries: 5
      start_period: 30s
    profiles:
      - fullstack
      - stack

  privacyidea:
    build:
      context: .
      args:
        PI_VERSION: "3.13"
        PI_VERSION_BUILD: "3.13"
    image: privacyidea-docker:3.13
    depends_on:
      db:
        condition: service_healthy
    deploy:
      restart_policy:
        condition:  unless-stopped
        delay: 3s
        window: 60s
    env_file:
      - ${ENVIRONMENT}
    ports:
      - "${PI_PORT:-8080}:${PI_PORT:-8080}"
    volumes:
      - pidata:/privacyidea/etc/persistent:rw,Z
      - type: bind
        source: scripts/
        target: /privacyidea/scripts/
        read_only: true
      - type: bind
        source: templates/resolver.json
        target: /privacyidea/etc/persistent/resolver.json
        read_only: true
    networks:
      - privacyidea
    healthcheck:
        test: [ "CMD", "/privacyidea/healthcheck.py" ]
        start_period: 10s
        start_interval: 10s
        interval: 12s
        timeout: 10s
        retries: 6
    restart: always
    profiles:
      - fullstack
      - stack

  reverse_proxy:
    image: nginx:stable-alpine
    environment:
      APP_PORT: ${PI_PORT}
      SERVERNAME: ${PROXY_SERVERNAME:-localhost}
      # Prod: set NGINX_TLS_CERT_PATH / NGINX_TLS_KEY_PATH to wherever you mount real certs.
      # Dev: defaults point at the self-signed pair bind-mounted below.
      SSL_CERT: ${NGINX_TLS_CERT_PATH:-/etc/nginx/ssl/pi.pem}
      SSL_KEY: ${NGINX_TLS_KEY_PATH:-/etc/nginx/ssl/pi.key}
    ports:
      - "${PROXY_PORT}:443"
      - "${VPN_POOLER_PORT:-5443}:444"
    volumes:
      - type: bind
        source: ./templates/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
      - type: bind
        source: ./templates/pi.key
        target: /etc/nginx/ssl/pi.key
        read_only: true
      - type: bind
        source: ./templates/pi.pem
        target: /etc/nginx/ssl/pi.pem
        read_only: true
      - type: bind
        source: ./templates/nginx_default.conf.template
        target: /etc/nginx/templates/default.conf.template
        read_only: true
      - type: bind
        source: ./templates/502.html
        target: /etc/privacyidea/customization/502.html
        read_only: true
    networks:
      - privacyidea
    restart: always
    profiles:
      - fullstack
      - stack

  freeradius:
    build:
      context: ./rlm_python3
    image: privacyidea-freeradius:latest
    environment:
      RADIUS_PI_HOST: https://reverse_proxy
      RADIUS_PI_REALM: ${RADIUS_PI_REALM:-}
      RADIUS_PI_RESCONF: ${RADIUS_PI_RESCONF:-}
      RADIUS_PI_SSLCHECK: ${RADIUS_PI_SSLCHECK:-false}
      RADIUS_DEBUG: ${RADIUS_DEBUG:-false}
      RADIUS_PI_TIMEOUT: ${RADIUS_PI_TIMEOUT:-10}
    ports:
      - "${RADIUS_PORT:-1812}:1812/tcp"
      - "${RADIUS_PORT:-1812}:1812/udp"
      - "${RADIUS_PORT_INC:-1813}:1813/udp"
    command:
      # uncomment the two lines below to debug radius
      #- freeradius
      #- -X
    volumes:
      - type: bind
        source: ./templates/clients.conf
        target: /etc/raddb/clients.conf
        read_only: true
    networks:
      - privacyidea
    restart: always
    profiles:
      - fullstack
      - stack

  vpn_pooler:
    build:
      context: ./pi-vpn-pooler
    image: pi-vpn-pooler:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: ${VPN_POOLER_DB_NAME:-vpn_pooler}
      DB_USER: ${VPN_POOLER_DB_USER:-vpn_pooler}
      DB_PASSWORD: ${VPN_POOLER_DB_PASSWORD:-changeme}
      DB_HOST: db
      DB_PORT: 5432
      PI_API_URL: ${VPN_POOLER_PI_API_URL:-https://reverse_proxy:443}
      PI_VERIFY_SSL: ${VPN_POOLER_PI_VERIFY_SSL:-false}
      DJANGO_SECRET_KEY: ${VPN_POOLER_DJANGO_SECRET_KEY:-changeme}
      DJANGO_DEBUG: ${VPN_POOLER_DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${VPN_POOLER_DJANGO_ALLOWED_HOSTS:-*}
      CSRF_TRUSTED_ORIGINS: ${VPN_POOLER_CSRF_TRUSTED_ORIGINS:-https://localhost:5443}
      DJANGO_LOG_LEVEL: ${VPN_POOLER_DJANGO_LOG_LEVEL:-INFO}
    volumes:
      - vpn_pooler_static:/app/staticfiles
    expose:
      - "8000"
    networks:
      - privacyidea
    restart: always
    profiles:
      - fullstack
      - stack

  openldap:
    image: osixia/openldap:latest
    environment:
      KEEP_EXISTING_CONFIG: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
      LDAP_SSL_HELPER_PREFIX: "ldap"
      LDAP_LOG_LEVEL: "0"
      LDAP_ORGANISATION: "Example Inc."
      LDAP_DOMAIN: "example.org"
      LDAP_BASE_DN: "dc=example,dc=org"
      LDAP_ADMIN_PASSWORD: "openldap"
      LDAP_CONFIG_PASSWORD: "config"
      LDAP_READONLY_USER: "false"
      LDAP_SEED_INTERNAL_LDIF_PATH: /ldif
      LDAP_RFC2307BIS_SCHEMA: "true"
    tty: true
    stdin_open: true
    ports:
      - "${LDAP_PORT}:389"
    networks:
      - privacyidea
    volumes:
      - type: bind
        source: ./templates/sample.ldif
        target: /ldif/sample.ldif
        read_only: true
    restart: always
    profiles:
      - fullstack
      - ldap
    
volumes:
  pgdata: {}
  pidata: {}
  vpn_pooler_static: {}
 
networks:
  privacyidea: {}
